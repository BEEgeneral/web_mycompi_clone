    <!-- Schema.org FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Qué es exactamente un Profesional de MyCompi?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Es un profesional especializado en un área — Marketing, Ventas, Atención al Cliente, etc. No es un chatbot genérico. Tiene memoria, conoce tu negocio y ejecuta tareas concretas: responder dudas de clientes, crear contenido, hacer follow-up de leads, generar informes. Trabaja de forma autónoma y reporta resultados."
          }
        },
        {
          "@type": "Question",
          "name": "¿Necesito conocimientos técnicos para usarlo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Configuras todo desde tu panel en minutos. Si tienes dudas, el equipo de soporte te ayuda. No necesitamos acceso a tus sistemas."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo se diferencia de contratar a alguien?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Un profesional de MyCompi no enferma, no pide vacaciones, no se distrae, trabaja 24/7 y cuesta €49/mes. No sustituye al 100% de una persona — pero sí puede hacer el trabajo de un junior en muchas tareas repetitivas, por una fracción del coste."
          }
        },
        {
          "@type": "Question",
          "name": "¿Puedo cancelar cuando quiera?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. Sin contratos, sin permanencia. Cancelas desde tu panel cuando quieras. No hay penalty ni costes de salida."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo funciona el pago?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Pago mensual con tarjeta a través de Stripe. Datos 100% seguros. Sin sorpresas: el precio que ves es el que pagas."
          }
        },
        {
          "@type": "Question",
          "name": "¿Hay factura fiscal?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. Stripe genera factura automática con todos los datos fiscales que necesites (CIF, dirección, IVA)."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué pasa si el profesional se equivoca?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Las acciones irreversibles siempre requieren tu aprobación. Además, el director de tu equipo supervisa y escala cuando algo está fuera de alcance o implica decisiones de negocio."
          }
        },
        {
          "@type": "Question",
          "name": "¿Mis datos están seguros?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tus datos se almacenan en servidores seguros (Neon PostgreSQL + Render). No compartimos información con terceros. Cumple con GDPR."
          }
        }
      ]
    }
    </script>
